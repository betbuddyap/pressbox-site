<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Lines — PressBox Analytics</title>
<meta name="description" content="Every active pick across all seven tiers, graded live every 30 minutes against the current best market line.">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Tokens FIRST, components AFTER -->
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/components/live-lines.css">

<style>
  /* ── Site nav (copied from about.html — keep in sync across pages) ── */
  :root { --max: 1200px; }
  nav { background: var(--cream); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
  .nav-logo img { height: 68px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-mid); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .btn-nav { background: var(--ink) !important; color: var(--cream) !important; padding: 8px 18px; border-radius: 4px; font-size: 12px !important; font-weight: 600 !important; letter-spacing: 0.5px; }

  .nav-links a.nav-live {
    color: var(--rust) !important;
    font-weight: 700;
    letter-spacing: 0.3px;
    position: relative;
    text-transform: uppercase;
    font-size: 11px;
  }
  .nav-links a.nav-live::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: 2px;
    animation: pulse-live 2.4s ease-in-out infinite;
  }
  .nav-links a.nav-live:hover { color: var(--rust-light) !important; }
  .nav-links a.nav-live.active { color: var(--ink) !important; }
  .nav-links a.nav-live.active::before { background: var(--ink); animation: none; }
  @keyframes pulse-live {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .mobile-menu a.nav-live-mobile { color: var(--rust) !important; }

  /* Hamburger */
  .hamburger {
    display: none;
    flex-direction: column !important;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: transparent;
    border: 0;
    outline: 0;
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
    box-shadow: none;
    width: 32px; height: 32px;
  }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--cream);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
  }
  .mobile-menu.open { display: flex !important; }
  .mobile-menu a {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
  }
  .mobile-menu .close-btn {
    position: absolute;
    top: 28px; right: 28px;
    font-size: 28px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--ink);
    line-height: 1;
  }
  .mobile-menu .btn-mobile {
    background: var(--ink);
    color: var(--cream) !important;
    padding: 14px 32px;
    border-radius: 4px;
    font-family: var(--sans) !important;
    font-size: 14px !important;
    font-weight: 600;
  }
  @media (min-width: 961px) { .hamburger { display: none !important; } }
  @media (max-width: 960px) { .nav-links { display: none; } .hamburger { display: flex; } }
</style>
</head>

<body class="ll-page">

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/pressbox-w2a-cream-cropped.png" alt="PressBox Analytics" style="height:68px;width:auto;display:block;">
    </a>
    <ul class="nav-links">
      <li><a href="/live-lines.html" class="nav-live active">Live Lines</a></li>
      <li><a href="/how-it-works.html" class="">How It Works</a></li>
      <li><a href="/about.html" class="">About</a></li>
      <li><a href="#" id="navSignOut" style="opacity:0.7;">Sign out</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <button class="close-btn" onclick="document.getElementById('mobileMenu').classList.remove('open')" aria-label="Close menu">✕</button>
  <a href="/live-lines.html" class="nav-live-mobile">Live Lines</a>
  <a href="/how-it-works.html">How It Works</a>
  <a href="/about.html">About</a>
  <a href="#" id="navSignOutMobile" style="opacity:0.7;">Sign out</a>
</div>
<script>
function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }

// Sign-out handlers — both desktop and mobile links use the same logic.
// Supabase client is loaded by the SDK script tag below (before live-lines.js)
// so we wait until DOMContentLoaded to attach handlers.
document.addEventListener('DOMContentLoaded', () => {
  const handleSignOut = async (e) => {
    e.preventDefault();
    try {
      if (window.supabase) {
        const sb = window.supabase.createClient(
          'https://brwalcuodwxsynrpiqjc.supabase.co',
          'sb_publishable_yUSCp6-m1gda0eMcGWuinw_LMLGP_uE'
        );
        await sb.auth.signOut();
      }
    } catch (err) {
      console.error('signOut failed:', err);
    }
    window.location.href = '/';
  };
  document.getElementById('navSignOut')?.addEventListener('click', handleSignOut);
  document.getElementById('navSignOutMobile')?.addEventListener('click', handleSignOut);
});
</script>

<main id="ll-app" class="ll-container">
  <!-- All page content renders here via JS based on state -->
</main>

<!-- Supabase JS client (loaded BEFORE live-lines.js, which uses it for auth) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/live-lines.js"></script>

</body>
</html>
