<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Lines — PressBox Analytics</title>
<meta name="description" content="Every active pick across all seven tiers, graded live every 30 minutes against the current best market line.">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Tokens FIRST, components AFTER -->
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/components/live-lines.css">
</head>

<body class="ll-page">

<!-- Site nav (placeholder — the real site has a shared nav include) -->
<nav style="border-bottom:1px solid var(--border);background:#fff;">
  <div class="ll-container" style="display:flex;align-items:center;justify-content:space-between;padding-top:var(--space-3);padding-bottom:var(--space-3);">
    <a href="/" style="font-family:var(--serif);font-size:var(--text-lg);font-weight:var(--weight-bold);color:var(--ink);text-decoration:none;">
      Press<span style="color:var(--gold);">Box</span>
    </a>
    <div style="display:flex;gap:var(--space-4);align-items:center;font-size:var(--text-base);">
      <a href="/live-lines" style="color:var(--rust);font-weight:var(--weight-semi);text-decoration:none;">Live Lines</a>
      <a href="/upcoming" style="color:var(--ink);text-decoration:none;">Upcoming</a>
      <a href="/rankings" style="color:var(--ink);text-decoration:none;">Rankings</a>
      <a href="/results" style="color:var(--ink);text-decoration:none;">Results</a>
      <a href="/about" style="color:var(--ink);text-decoration:none;">About</a>
      <a href="/account" style="background:var(--ink);color:var(--cream);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);text-decoration:none;font-weight:var(--weight-semi);">Account</a>
    </div>
  </div>
</nav>

<main id="ll-app" class="ll-container">
  <!-- All page content renders here via JS based on state -->
  <!-- States: loading (initial), default, filtered, empty, paywall -->
</main>

<script src="/js/live-lines.js"></script>

</body>
</html>
