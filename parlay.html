<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Parlay — PressBox Analytics</title>
<meta name="description" content="Build a parlay from live picks. Every leg priced against the current best market line, with the true combined edge.">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Tokens FIRST, components AFTER — same as live-lines so cards match exactly -->
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/components/live-lines.css">

<style>
  /* ── Site nav (copied from live-lines.html — keep in sync across pages) ── */
  :root { --max: 1200px; }
  nav { background: var(--cream); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
  .nav-logo img { height: 68px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-mid); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .nav-links a.nav-live { color: var(--rust) !important; font-weight: 700; letter-spacing: 0.3px; position: relative; text-transform: uppercase; font-size: 11px; }
  .nav-links a.nav-live::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--rust); border-radius: 50%; margin-right: 7px; vertical-align: 2px; animation: pulse-live 2.4s ease-in-out infinite; }
  .nav-links a.nav-live:hover { color: var(--rust-light) !important; }
  .nav-links a.nav-live.active { color: var(--ink) !important; }
  .nav-links a.nav-live.active::before { background: var(--ink); animation: none; }
  @keyframes pulse-live { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  .mobile-menu a.nav-live-mobile { color: var(--rust) !important; }
  .hamburger { display: none; flex-direction: column !important; align-items: center; justify-content: center; gap: 5px; cursor: pointer; padding: 4px; background: transparent; border: 0; outline: 0; -webkit-appearance: none; appearance: none; border-radius: 0; box-shadow: none; width: 32px; height: 32px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }
  .mobile-menu { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--cream); z-index: 300; flex-direction: column; align-items: center; justify-content: center; gap: 36px; }
  .mobile-menu.open { display: flex !important; }
  .mobile-menu a { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--ink); text-decoration: none; }
  .mobile-menu .close-btn { position: absolute; top: 28px; right: 28px; font-size: 28px; cursor: pointer; background: none; border: none; color: var(--ink); line-height: 1; }
  @media (min-width: 961px) { .hamburger { display: none !important; } }
  @media (max-width: 960px) { .nav-links { display: none; } .hamburger { display: flex; } }

  /* ── Parlay-specific (everything else reuses live-lines.css ll- classes) ── */

  /* Selected-leg state layered over the shared ll-row card */
  .ll-row.pl-selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .ll-row.pl-selected .ll-row-header { background: color-mix(in srgb, var(--gold) 8%, transparent); }

  /* Select indicator sits where the accordion chevron would be */
  .pl-check {
    flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border); display: grid; place-items: center;
    color: transparent; transition: all 0.15s;
  }
  .ll-row.pl-selected .pl-check { background: var(--gold); border-color: var(--gold); color: var(--ink); }
  .pl-check svg { width: 13px; height: 13px; }

  /* No-edge legs are selectable but visually muted */
  .ll-row.ll-row--no-edge .ll-row-matchup { opacity: 0.85; }

  /* ── Sticky slip ─────────────────────────────────────────── */
  .pl-slip {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
    background: var(--ink); color: var(--cream);
    border-top: 1px solid rgba(255,255,255,0.08);
    transform: translateY(calc(100% - 60px)); transition: transform 0.28s ease;
    max-height: 78vh; display: flex; flex-direction: column;
  }
  .pl-slip.pl-open { transform: translateY(0); }
  .pl-slip-handle {
    height: 60px; flex: 0 0 60px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 20px; cursor: pointer;
    max-width: 920px; margin: 0 auto; width: 100%;
  }
  .pl-slip-count { font-family: var(--sans); font-weight: var(--weight-bold); font-size: var(--text-base); letter-spacing: 0.2px; }
  .pl-slip-count span { color: var(--gold-light); }
  .pl-slip-cta { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); letter-spacing: 0.1em; text-transform: uppercase; color: var(--cream); opacity: 0.75; }
  .pl-slip-body { overflow-y: auto; padding: 0 20px 24px; max-width: 920px; margin: 0 auto; width: 100%; }

  .pl-leg { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .pl-leg-main { flex: 1 1 auto; min-width: 0; }
  .pl-leg-matchup { font-family: var(--sans); font-size: var(--text-sm); font-weight: var(--weight-semi); color: var(--cream); }
  .pl-leg-pick { font-family: var(--sans); font-size: var(--text-sm); color: #B9B9AC; margin-top: 2px; }
  .pl-leg-pick .ll-row-pick-num { font-family: 'JetBrains Mono', monospace; color: var(--cream); }
  .pl-leg-flag { font-size: var(--text-sm); color: #E08A5B; margin-top: 3px; }
  .pl-leg-x { flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%; border: none; background: rgba(255,255,255,0.08); color: var(--cream); cursor: pointer; font-size: 15px; line-height: 1; display: grid; place-items: center; }
  .pl-leg-x:hover { background: rgba(255,255,255,0.18); }

  .pl-grade-btn { width: 100%; margin-top: 16px; padding: 14px; border: none; border-radius: var(--radius-md); background: var(--gold); color: var(--ink); font-family: var(--sans); font-weight: var(--weight-bold); font-size: var(--text-base); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
  .pl-grade-btn:hover { background: var(--gold-light); }
  .pl-grade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .pl-result { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.12); }
  .pl-result-hero { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .pl-result-odds { font-family: var(--serif); font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--gold-light); }
  .pl-result-payout { font-family: var(--sans); font-size: var(--text-sm); color: #B9B9AC; }
  .pl-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; margin-top: 16px; }
  .pl-stat { display: flex; flex-direction: column; gap: 2px; }
  .pl-stat-k { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); letter-spacing: 0.1em; text-transform: uppercase; color: #8A8A7A; }
  .pl-stat-v { font-family: 'JetBrains Mono', monospace; font-size: var(--text-base); color: var(--cream); }
  .pl-stat-v.pos { color: #7FA86A; }
  .pl-stat-v.neg { color: #E08A5B; }
  .pl-corr { margin-top: 14px; padding: 10px 12px; border-radius: var(--radius-md); font-family: var(--sans); font-size: var(--text-sm); line-height: 1.5; background: rgba(255,255,255,0.05); color: #C7C7B8; }
  .pl-corr.pl-corr-warn { background: color-mix(in srgb, var(--rust) 22%, transparent); color: #F0C9B4; }

  /* Bet links inside the dark slip: reuse live-lines' .ll- markup, recolor for ink bg.
     (Black .ll-bet-button is invisible here — flip to gold like .pl-grade-btn.) */
  .pl-slip .pl-book { margin-top: 16px; }
  .pl-slip .ll-bet-button { background: var(--gold); color: var(--ink); }
  .pl-slip .ll-bet-button:hover { background: var(--gold-light); }
  .pl-slip .ll-other-books-header,
  .pl-slip .ll-book-name { color: var(--cream); }
  .pl-slip .ll-accordion-section-label { color: #8A8A7A; }
  .pl-slip .ll-other-books-chevron { stroke: var(--cream); }
  .pl-slip .ll-book-row { border-top-color: rgba(255,255,255,0.08); }
  .pl-slip .ll-book-line { color: #B9B9AC; }

  .pl-empty-slip { padding: 24px 0 8px; font-family: var(--sans); font-size: var(--text-sm); color: #8A8A7A; text-align: center; }
  .pl-page-pad { height: 84px; }
  /* ── Parlay: mode toggle (uses .ll-filter-pill for the site's square selector) ── */
  .pl-mode { display: flex; gap: var(--space-2); margin-top: var(--space-4); }

  /* ── Parlay: pre-built preset gallery ── */
  .pl-preset-section { margin: var(--space-6) 0 var(--space-5); }
  .pl-preset-section-title { font-family: var(--serif); font-size: var(--text-lg); font-weight: var(--weight-bold); color: var(--ink); margin: 0; }
  .pl-preset-section-sub { font-family: var(--sans); font-size: var(--text-sm); color: var(--text-mid); margin: 2px 0 var(--space-4); }
  .pl-preset-row { display: grid; gap: var(--space-4); grid-template-columns: repeat(3, minmax(0, 1fr)); align-items: start; }
  @media (max-width: 860px) { .pl-preset-row { grid-template-columns: 1fr; } }
  .pl-preset-card { background: #fff; border: 0.5px solid var(--border); border-radius: 12px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
  .pl-preset-card, .pl-preset-card * { box-sizing: border-box; }
  .pl-preset-head { padding: var(--space-4); }
  /* Bottom panel copies live-lines' .ll-accordion exactly: cream-dark, top border, own padding */
  .pl-preset-panel { background: var(--cream-dark); border-top: 1px solid var(--border); padding: var(--space-4); }
  .pl-preset-legcount { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin: 0 0 var(--space-3); }
  .pl-preset-legs { display: flex; flex-direction: column; gap: var(--space-2); }
  .pl-preset-legs .ll-row { margin: 0; }
  .pl-preset-legs .ll-row-header { cursor: default; }

  /* Shared: our hit probability vs Vegas's implied (cards + custom slip) */
  .pl-preset-probs { display: flex; }
  .pl-prob { flex: 1; text-align: center; }
  .pl-prob-k { display: block; font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-mid); }
  .pl-prob-v { display: block; font-family: var(--serif); font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--ink); margin-top: 4px; line-height: 1; }
  .pl-prob--ours .pl-prob-v { color: var(--gold); }
  .pl-preset-odds { text-align: center; font-family: var(--sans); font-size: var(--text-sm); color: var(--text-mid); margin-top: var(--space-3); }

  /* ── Parlay: build-your-own instruction banner ── */
  .pl-build-hint { font-family: var(--sans); font-size: var(--text-sm); color: var(--text-mid); background: var(--cream-mid); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); margin: var(--space-5) 0 var(--space-2); line-height: 1.5; }
  .pl-build-hint strong { color: var(--ink); font-weight: var(--weight-semi); }

  /* Where to bet it: reuses live-lines' .ll-bet-button + .ll-other-books widget
     verbatim (styled in live-lines.css) so it's pixel-identical to the board. */
  .pl-book { margin-top: var(--space-4); }
</style>

  try { session = (await sb.auth.getSession())?.data?.session || null; } catch (e) { return; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  'use strict';

  // ── Config (identical to live-lines) ────────────────────────
  const API_BASE = 'https://betbuddy-backend.onrender.com';
  const FEED_URL  = `${API_BASE}/canonical/live-lines/feed`;
  const GRADE_URL = `${API_BASE}/parlay/grade`;
  const PRESETS_URL = `${API_BASE}/parlay/presets`;
  const SEASON = 2026;

  // Paste the SAME anon key that's in live-lines.js (safe to expose; RLS
  // protects data server-side). Without it the feed auth can't resolve.
  const SUPABASE_URL  = 'https://brwalcuodwxsynrpiqjc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyd2FsY3VvZHd4c3lucnBpcWpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzMyNzQsImV4cCI6MjA5MjA0OTI3NH0.HjHkM1Ir9LGutCfAEQsOWOjQ6I5-otzGoReLvrPs6iQ';
  const sb = (typeof supabase !== 'undefined') ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

  const state = {
    week: null, weeks: [], picks: [],
    selected: new Map(),   // pick_id -> pick object
    slipOpen: false, grade: null, grading: false,
    mode: 'prebuilt',          // open on the pre-built gallery (fast: no model on the presets path)
    presets: null, presetPool: null, presetsLoading: false, presetsError: false,
    buildFilters: { market: null, aplusOnly: false, gradedOnly: false },
  };

  const root = document.getElementById('pl-root');

  // ── Utilities (mirrored from live-lines) ─────────────────────
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function weekLabel(w) { return w === 0 ? 'Week 0' : `Week ${w}`; }

  const TIER_SORT = { 'A+': 7, 'smart_money': 6, 'A': 5, 'goldilocks': 4, 'lottery': 3, 'no_edge': 0 };

  function parseKickoff(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return null;
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', timeZone: 'America/New_York' });
    const timeLabel = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short' })
      .replace(' EDT', ' ET').replace(' EST', ' ET');
    const dateKey = d.toLocaleDateString('en-US', { timeZone: 'America/New_York' });
    return { dayLabel, timeLabel, dateKey, timeKey: timeLabel };
  }

  function renderBadge(tier) {
    const map = {
      'A+':          { label: 'A+', aria: 'A plus tier',      key: 'aplus' },
      'A':           { label: 'A',  aria: 'A tier',           key: 'a' },
      'smart_money': { label: 'SM', aria: 'Smart Money tier', key: 'smart_money' },
      'goldilocks':  { label: 'GL', aria: 'Goldilocks tier',  key: 'goldilocks' },
      'lottery':     { label: 'LT', aria: 'Lottery tier',     key: 'lottery' },
      'no_edge':     { label: 'NE', aria: 'No edge', key: 'no_edge' },
    };
    const m = map[tier] || { label: esc(tier), aria: esc(tier), key: 'no_edge' };
    return `<span class="ll-badge ll-badge--${m.key}" aria-label="${m.aria}">${m.label}</span>`;
  }

  function pickLineText(p) {
    if (!p.side) return '—';
    const bookName = esc(p.book?.name || '');
    const tied = Number(p.tied_books_count || 0);
    let bookText = bookName;
    if (tied === 1) bookText = `${bookName} + 1 other`;
    else if (tied > 1) bookText = `${bookName} + ${tied} others`;
    const bookSuffix = bookName ? ` · ${bookText}` : '';
    if (p.market === 'ml') return `${esc(p.side)} ML <span class="ll-row-pick-num">${esc(p.line)}</span>${bookSuffix}`;
    return `${esc(p.side)} <span class="ll-row-pick-num">${esc(p.line)}</span>${bookSuffix}`;
  }

  // ── Auth (mirrored) ──────────────────────────────────────────
  async function getAccessToken() {
    // Fast path: read the stored session token straight from localStorage — no
    // network, no token refresh. This is what was hanging the page: getSession()
    // was going to the auth server and stalling ~30-45s before falling through.
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('sb-') && k.endsWith('-auth-token')) {
          const v = JSON.parse(localStorage.getItem(k) || 'null');
          const tok = v && (v.access_token
                        || (v.currentSession && v.currentSession.access_token)
                        || (Array.isArray(v) && v[0]));
          if (tok) return tok;
        }
      }
    } catch (e) {}
    // Fallback only, and never allowed to hang the page (4s hard cap).
    if (!sb) return null;
    try {
      const timeout = new Promise((res) => setTimeout(() => res(null), 4000));
      const live = sb.auth.getSession().then(
        (r) => (r && r.data && r.data.session && r.data.session.access_token) || null);
      return await Promise.race([live, timeout]);
    } catch (e) { return null; }
  }

  // ── Network ──────────────────────────────────────────────────
  async function fetchFeed() {
    const headers = {};
    const token = await getAccessToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${FEED_URL}?season=${SEASON}`, { credentials: 'omit', headers });
    if (res.status === 401 || res.status === 402) throw new Error('paywall');
    if (!res.ok) throw new Error(`feed HTTP ${res.status}`);
    const payload = await res.json();
    if (payload.error) throw new Error(payload.error);
    mergeWeeks(payload.weeks);
    if (state.week === null && state.weeks.length > 0) state.week = state.weeks[0];
    return payload.picks || [];
  }

  async function gradeTicket() {
    const legIds = [...state.selected.keys()];
    if (!legIds.length) return;
    state.grading = true; renderSlip();
    try {
      const headers = { 'Content-Type': 'application/json' };
      const token = await getAccessToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(GRADE_URL, { method: 'POST', credentials: 'omit', headers,
        body: JSON.stringify({ season: SEASON, leg_ids: legIds }) });
      if (!res.ok) throw new Error(`grade HTTP ${res.status}`);
      state.grade = await res.json();
    } catch (e) { state.grade = { error: e.message }; }
    finally { state.grading = false; renderSlip(); }
  }

  // ── Board render (day → time → ll-row cards) ─────────────────
  function groupPicks(picks) {
    const byDay = new Map();
    for (const p of picks) {
      const k = parseKickoff(p.kickoff);
      if (!k) continue;
      if (!byDay.has(k.dateKey)) byDay.set(k.dateKey, { dayLabel: k.dayLabel, kickoff: p.kickoff, byTime: new Map() });
      const day = byDay.get(k.dateKey);
      if (!day.byTime.has(k.timeKey)) day.byTime.set(k.timeKey, { timeLabel: k.timeLabel, picks: [] });
      day.byTime.get(k.timeKey).picks.push(p);
    }
    const days = [];
    for (const [dateKey, day] of byDay) {
      const times = [];
      for (const [timeKey, tg] of day.byTime) {
        tg.picks.sort((a, b) => {
          const ar = TIER_SORT[a.tier] || 0, br = TIER_SORT[b.tier] || 0;
          if (br !== ar) return br - ar;
          return (a.matchup || '').localeCompare(b.matchup || '');
        });
        times.push({ timeKey, timeLabel: tg.timeLabel, picks: tg.picks });
      }
      times.sort((a, b) => (a.picks[0]?.kickoff || '').localeCompare(b.picks[0]?.kickoff || ''));
      days.push({ dateKey, dayLabel: day.dayLabel, kickoff: day.kickoff, times });
    }
    days.sort((a, b) => (a.kickoff || '').localeCompare(b.kickoff || ''));
    return days;
  }

  function renderLegRow(p) {
    const isNoEdge = p.tier === 'no_edge';
    const isSel = state.selected.has(p.pick_id);
    return `
      <article class="ll-row ${isNoEdge ? 'll-row--no-edge' : ''} ${isSel ? 'pl-selected' : ''}" data-pick-id="${esc(p.pick_id)}">
        <button class="ll-row-header" data-action="select" aria-pressed="${isSel ? 'true' : 'false'}">
          ${renderBadge(p.tier)}
          <div class="ll-row-content">
            <div class="ll-row-matchup">${esc(p.matchup || '—')}</div>
            <div class="ll-row-pick">${pickLineText(p)}</div>
          </div>
          <span class="pl-check" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
      </article>`;
  }

  function renderDayBucket(day) {
    return `
      <section class="ll-day">
        <h2 class="ll-day-header">${esc(day.dayLabel)}</h2>
        ${day.times.map(t => `
          <div class="ll-time-header">${esc(t.timeLabel)}</div>
          ${t.picks.map(renderLegRow).join('')}
        `).join('')}
      </section>`;
  }

  // Accumulate weeks from every source (feed + presets) into one sorted union
  // so the shared selector never loses a week to whichever fetch resolves last.
  function mergeWeeks(incoming) {
    if (!Array.isArray(incoming) || !incoming.length) return;
    const set = new Set([...(state.weeks || []), ...incoming]);
    state.weeks = [...set].sort((a, b) => a - b);
  }

  function renderWeekTabs() {
    if (!state.weeks || state.weeks.length <= 1) return '';
    return `
      <div class="ll-week-bar"><div class="ll-week-bar-inner" role="tablist" aria-label="Pick week">
        ${state.weeks.map(w => `
          <button class="ll-week-tab ${w === state.week ? 'active' : ''}" data-week="${w}"
                  role="tab" aria-selected="${w === state.week ? 'true' : 'false'}">${esc(weekLabel(w))}</button>
        `).join('')}
      </div></div>`;
  }

  function render() {
    root.innerHTML = `
      <header class="ll-header">
        <div class="ll-eyebrow"><span class="ll-eyebrow-dot ll-eyebrow-dot--static"></span> Parlay Builder</div>
        <h1 class="ll-headline">Parlays</h1>
        <div class="ll-meta">Pre-built cards from our strongest edges, or build your own from the full board. Every leg is priced against the current best line.</div>
        <div class="pl-mode" role="tablist" aria-label="Parlay mode">
          <button class="ll-filter-pill pl-mode-btn" data-mode="prebuilt" aria-pressed="${state.mode==='prebuilt'}">Pre-built</button>
          <button class="ll-filter-pill pl-mode-btn" data-mode="custom" aria-pressed="${state.mode==='custom'}">Build your own</button>
        </div>
      </header>
      ${renderWeekTabs()}
      ${state.mode === 'prebuilt' ? renderPresetsView() : renderBuildView()}
    `;
    const slip = document.getElementById('pl-slip');
    if (slip) slip.style.display = (state.mode === 'custom') ? '' : 'none';
    if (state.mode === 'custom') renderSlip();

  // Same pill row as Live Lines (reuses .ll-filters / .ll-filter-pill). "Graded"
  // hides no-edge picks; market pills and Graded combine; A+ only is the narrow one.
  function renderBuildFilters() {
    const f = state.buildFilters;
    const isActive = (m) => f.market === m && !f.aplusOnly;
    return `
      <div class="ll-filters" role="group" aria-label="Filter picks">
        <span class="ll-filter-label">Pick Type</span>
        <button class="ll-filter-pill" data-filter="all" aria-pressed="${!f.market && !f.aplusOnly && !f.gradedOnly ? 'true' : 'false'}">All</button>
        <button class="ll-filter-pill" data-filter="spread" aria-pressed="${isActive('spread') ? 'true' : 'false'}">Spread</button>
        <button class="ll-filter-pill" data-filter="total" aria-pressed="${isActive('total') ? 'true' : 'false'}">Total</button>
        <button class="ll-filter-pill" data-filter="ml" aria-pressed="${isActive('ml') ? 'true' : 'false'}">ML</button>
        <button class="ll-filter-pill" data-filter="graded" aria-pressed="${f.gradedOnly ? 'true' : 'false'}">Graded</button>
        <button class="ll-filter-pill" data-filter="aplus" aria-pressed="${f.aplusOnly ? 'true' : 'false'}">A+ only</button>
      </div>`;
  }

  function applyBuildFilters(picks) {
    const f = state.buildFilters;
    return picks.filter(p => {
      if (f.aplusOnly && p.tier !== 'A+') return false;
      if (f.gradedOnly && (!p.tier || p.tier === 'no_edge')) return false;
      if (f.market && p.market !== f.market) return false;
      return true;
    });
  }

  function renderBuildView() {
    const inWeek = state.picks.filter(p => state.week === null || p.week === state.week);
    const filtered = applyBuildFilters(inWeek);
    const days = groupPicks(filtered);
    const empty = inWeek.length
      ? 'No picks match this filter.'
      : 'No open picks for this week yet.';
    return `
      <div class="pl-build-hint"><strong>Tap any pick to add it as a leg.</strong> Add two or more, then tap the slip at the bottom to grade your parlay. Every leg is priced against the current best line.</div>
      ${renderBuildFilters()}
      ${days.length ? days.map(renderDayBucket).join('') :
        `<p style="padding:var(--space-6) 0;color:var(--text-mid);">${empty}</p>`}
    `;
  }

  // ── Pre-built presets gallery ────────────────────────────────
  const _TYPE_ORDER = ['best', 'safest', 'longshot'];

  function renderPresetsView() {
    if (state.presetsError) return `<p class="ll-meta" style="padding:var(--space-6) 0;">Couldn\u2019t load pre-built parlays. Refresh to try again.</p>`;
    if (!state.presets) return renderPresetsLoading();
    if (!state.presets.length) {
      const msg = (state.presetPool === 0)
        ? `These picks aren't ready to parlay yet \u2014 we need live odds on the board before we can price them into a card. They'll show up here automatically once the lines post.`
        : `Not enough independent picks this week to build a parlay yet (each leg has to come from a different game).`;
      return `<p class="ll-meta" style="padding:var(--space-6) 0;">${msg}</p>`;
    }

    // Group the 9 presets into their three types, ordered Best \u2192 Safest \u2192 Longshot,
    // each type's cards ordered by leg count.
    const groups = new Map();
    for (const pre of state.presets) {
      const t = pre.type || 'other';
      if (!groups.has(t)) groups.set(t, []);
      groups.get(t).push(pre);
    }
    const rank = t => { const i = _TYPE_ORDER.indexOf(t); return i === -1 ? 99 : i; };
    const types = [...groups.keys()].sort((a, b) => rank(a) - rank(b));

    return types.map(t => {
      const cards = groups.get(t).slice().sort((a, b) =>
        (a.requested_legs || a.leg_count || 0) - (b.requested_legs || b.leg_count || 0));
      const head = cards[0] || {};
      return `
        <section class="pl-preset-section">
          <h2 class="pl-preset-section-title">${esc(head.name || t)}</h2>
          <div class="pl-preset-section-sub">${esc(head.subtitle || '')}</div>
          <div class="pl-preset-row">${cards.map(renderPresetCard).join('')}</div>
        </section>`;
    }).join('');
  }

  function renderPresetsLoading() {
    const card = `
      <article class="pl-preset-card">
        <div class="ll-skeleton" style="width:42%;height:12px;margin-bottom:14px;"></div>
        ${[1,2,3].map(() => `
          <div class="ll-row-skeleton">
            <div class="ll-skeleton ll-skeleton--badge"></div>
            <div style="flex:1;">
              <div class="ll-skeleton ll-skeleton--line-a"></div>
              <div class="ll-skeleton ll-skeleton--line-b"></div>
            </div>
          </div>`).join('')}
        <div class="ll-skeleton" style="display:block;width:100%;height:46px;margin-top:16px;"></div>
      </article>`;
    return `
      <section class="pl-preset-section">
        <div class="ll-skeleton ll-skeleton--day"></div>
        <div class="pl-preset-row">${card}${card}${card}</div>
      </section>`;
  }

  function renderPresetCard(pre) {
    const c = pre.combined || {};
    const n = pre.requested_legs || pre.leg_count || (pre.legs ? pre.legs.length : 0);
    // Legs use the board's own .ll-row markup so they read identically to Live Lines.
    const legs = (pre.legs || []).map(leg => `
      <article class="ll-row">
        <div class="ll-row-header" style="cursor:default;">
          ${renderBadge(leg.tier)}

            <div class="ll-row-pick">${pickLineText(leg)}</div>
          </div>
        </div>
      </article>`).join('');
    return `
      <article class="pl-preset-card">
        <div class="pl-preset-head">
          <div class="pl-preset-legcount">${n}-Leg Parlay</div>
          <div class="pl-preset-legs">${legs}</div>
        </div>
        <div class="pl-preset-panel">
          ${renderProbPair(c.our_prob, c.market_fair_prob)}

          ${pre.note ? `<div class="pl-corr">${esc(pre.note)}</div>` : ''}
        </div>
      </article>`;
  }

  // Shared: our hit probability vs Vegas's implied, side by side (no EV number).
  function renderProbPair(ourProb, vegasProb) {
    return `
      <div class="pl-preset-probs">
        <div class="pl-prob pl-prob--ours">
          <span class="pl-prob-k">Our hit probability</span>
          <span class="pl-prob-v">${ourProb != null ? (ourProb*100).toFixed(1)+'%' : '\u2014'}</span>
        </div>
        <div class="pl-prob">
          <span class="pl-prob-k">Vegas\u2019s implied</span>
          <span class="pl-prob-v">${vegasProb != null ? (vegasProb*100).toFixed(1)+'%' : '\u2014'}</span>
        </div>
      </div>`;
  }

  // "Where to bet it": the book that pays the most for the whole card (product
  // of each leg's odds there), with a dropdown of the other books' combined
  // prices. best = {book, url, american_odds, ...}; breakdown = full sorted list.
  // "Where to bet it": renders with live-lines' OWN classes so it is 1:1 with
  // the board — .ll-other-books collapsible (chevron) + .ll-bet-button CTA.
  // best/breakdown items: {book, url, american_odds, ...}.
  function renderBestBook(best, breakdown) {
    if (!best || !best.book) return '';
    const oddsStr = (v) => v != null ? fmtSigned(v) : '\u2014';
    const linkIcon = `<svg class="ll-book-name-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4h6v6M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

    const others = (Array.isArray(breakdown) ? breakdown : []).filter(b => b.book !== best.book);
    const rows = others.map(b => {
      const inner = `<span class="ll-book-name">${esc(b.book)}${b.url ? linkIcon : ''}</span><span class="ll-book-line">${oddsStr(b.american_odds)}</span>`;
      return b.url
        ? `<a class="ll-book-row" href="${esc(b.url)}" target="_blank" rel="noopener noreferrer" aria-label="Bet at ${esc(b.book)} (opens in new tab)">${inner}</a>`
        : `<div class="ll-book-row">${inner}</div>`;
    }).join('');
    const otherBooks = others.length ? `
      <div class="ll-other-books">
        <button type="button" class="ll-other-books-header" aria-expanded="false">
          <span class="ll-accordion-section-label" style="margin:0;">Other books</span>
          <svg class="ll-other-books-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="ll-other-books-rows" style="display:none;margin-top:var(--space-2);">${rows}</div>
      </div>` : '';

    const bestOdds = best.american_odds != null ? ' ' + fmtSigned(best.american_odds) : '';
    const btn = best.url
      ? `<a class="ll-bet-button" href="${esc(best.url)}" target="_blank" rel="noopener noreferrer" aria-label="Bet at ${esc(best.book)} (opens in new tab)" style="margin-top:var(--space-3);">Bet at ${esc(best.book)}${bestOdds} \u2192</a>`
      : `<span class="ll-bet-button" style="margin-top:var(--space-3);cursor:default;">Bet at ${esc(best.book)}${bestOdds}</span>`;

    // Same order as the board: other books first, then the bet button.
    return `<div class="pl-book">${otherBooks}${btn}</div>`;
  }

  async function fetchPresets() {
    state.presetsLoading = true; state.presetsError = false;
    state.presets = null; render();  // show the skeleton immediately (first load AND week switches)
    try {
      const headers = {};
      const token = await getAccessToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const weekParam = (state.week != null) ? `&week=${state.week}` : '';
      const res = await fetch(`${PRESETS_URL}?season=${SEASON}${weekParam}`, { credentials:'omit', headers });
      if (res.status === 401 || res.status === 402) { state.presetsLoading = false; renderPaywall(); return; }
      if (!res.ok) throw new Error(`presets HTTP ${res.status}`);
      const payload = await res.json();
      state.presets = payload.presets || [];
      state.presetPool = (payload.pool_size != null) ? payload.pool_size : null;
      mergeWeeks(payload.weeks);
      if (state.week == null && payload.week != null) state.week = payload.week;
    } catch (e) { state.presetsError = true; }
    finally { state.presetsLoading = false; render(); }
  }

  function renderError() {
    root.innerHTML = `<header class="ll-header"><h1 class="ll-headline">Couldn’t load picks</h1>

  // ── Slip render ──────────────────────────────────────────────
  function fmtSigned(n) { return (Number(n) > 0 ? '+' : '') + n; }

  function renderSlip() {
    const slip = document.getElementById('pl-slip');
    const count = state.selected.size;
    document.getElementById('pl-count').textContent = count;
    document.getElementById('pl-slip-cta').textContent =
      count === 0 ? 'Tap picks to build' : (state.slipOpen ? 'Tap to collapse' : 'Tap to review & grade');
    slip.classList.toggle('pl-open', state.slipOpen && count > 0);

    const body = document.getElementById('pl-slip-body');
    if (count === 0) { body.innerHTML = `<div class="pl-empty-slip">No legs yet. Tap picks above to add them.</div>`; return; }

    const legs = [...state.selected.values()];
    const missing = new Set((state.grade && state.grade.missing_leg_ids) || []);
    const legsHtml = legs.map(p => {
      const flagged = missing.has(p.pick_id);
      return `
        <div class="pl-leg">
          <div class="pl-leg-main">
            <div class="pl-leg-matchup">${esc(p.matchup || '—')}</div>
            <div class="pl-leg-pick">${pickLineText(p)}</div>
            ${flagged ? `<div class="pl-leg-flag">No edge — can’t be priced as a leg. Remove it to grade the rest.</div>` : ''}
          </div>
          <button class="pl-leg-x" data-remove="${esc(p.pick_id)}" aria-label="Remove leg">&times;</button>
        </div>`;
    }).join('');

    body.innerHTML = `
      ${legsHtml}
      <button class="pl-grade-btn" id="pl-grade-btn" ${state.grading ? 'disabled' : ''}>
        ${state.grading ? 'Grading…' : `Grade ${count}-leg parlay`}
      </button>
      ${renderResult()}`;
  }

  function renderResult() {
    const g = state.grade;
    if (!g) return '';
    if (g.error) return `<div class="pl-corr pl-corr-warn">Couldn’t grade this ticket: ${esc(g.error)}</div>`;
    // _combine_ticket returns the combined stats at the top level of the grade payload.
    const t = g.ticket || g.combined || g;
    if (t.american_odds == null && t.our_prob == null) {
      return `<div class="pl-corr">Add at least two priceable legs to see combined odds.</div>`;
    }
    const corr = g.correlation || {};
    const vegas = (t.market_fair_prob != null) ? t.market_fair_prob : t.breakeven_prob;
    const legN = g.leg_count ?? (g.legs ? g.legs.length : null);
    return `
      <div class="pl-result">
        ${renderProbPair(t.our_prob, vegas)}
        <div class="pl-preset-odds">${t.american_odds != null ? fmtSigned(t.american_odds) : '\u2014'} \u00b7 $100 returns $${t.payout_per_100 != null ? Number(t.payout_per_100).toFixed(0) : '\u2014'}${legN != null ? ' \u00b7 ' + legN + ' legs' : ''}</div>
        ${corr.note ? `<div class="pl-corr ${corr.independence_valid === false ? 'pl-corr-warn' : ''}">${esc(corr.note)}</div>` : ''}
        ${renderBestBook(g.best_book, g.book_breakdown)}
      </div>`;
  }

  // ── Events ───────────────────────────────────────────────────
  function toggleLeg(pickId) {
    const p = state.picks.find(x => String(x.pick_id) === String(pickId));
    if (!p) return;
    if (state.selected.has(p.pick_id)) state.selected.delete(p.pick_id);
    else { state.selected.set(p.pick_id, p); if (!state.slipOpen) state.slipOpen = true; }
    state.grade = null;    // selection changed → prior grade is stale
    render();
  }

  function keyMatching(v) { for (const k of state.selected.keys()) if (String(k) === String(v)) return k; return v; }

  document.addEventListener('click', (e) => {
    const obHeader = e.target.closest('.ll-other-books-header');
    if (obHeader) {
      const wrap = obHeader.closest('.ll-other-books');
      const rows = wrap && wrap.querySelector('.ll-other-books-rows');
      const chev = obHeader.querySelector('.ll-other-books-chevron');
      const open = obHeader.getAttribute('aria-expanded') === 'true';
      obHeader.setAttribute('aria-expanded', open ? 'false' : 'true');
      if (rows) rows.style.display = open ? 'none' : 'block';
      if (chev) chev.style.transform = open ? '' : 'rotate(180deg)';
      return;
    }
    const fpill = e.target.closest('.ll-filter-pill[data-filter]');
    if (fpill) {
      const f = fpill.dataset.filter;
      const bf = state.buildFilters;
      if (f === 'all') { bf.market = null; bf.aplusOnly = false; bf.gradedOnly = false; }
      else if (f === 'graded') { bf.gradedOnly = !bf.gradedOnly; }
      else if (f === 'aplus') { bf.aplusOnly = !bf.aplusOnly; if (bf.aplusOnly) bf.market = null; }
      else { bf.market = (bf.market === f) ? null : f; bf.aplusOnly = false; }
      render();
      return;
    }
    const modeBtn = e.target.closest('.pl-mode-btn');
    if (modeBtn) {
      const m = modeBtn.dataset.mode;
      if (m && m !== state.mode) {
        state.mode = m;
        render();
        if (m === 'prebuilt' && !state.presets && !state.presetsLoading) fetchPresets();
      }
      return;
    }
    const selBtn = e.target.closest('[data-action="select"]');
    if (selBtn) { toggleLeg(selBtn.closest('[data-pick-id]').dataset.pickId); return; }
    const tab = e.target.closest('.ll-week-tab');
    if (tab) {
      const w = parseInt(tab.dataset.week, 10);
      if (w !== state.week) {
        state.week = w;
        if (state.mode === 'prebuilt') fetchPresets(); else render();
      }
      return;
    }
    const rm = e.target.closest('[data-remove]');
    if (rm) { state.selected.delete(keyMatching(rm.dataset.remove)); state.grade = null; render(); return; }
    if (e.target.closest('#pl-grade-btn')) { gradeTicket(); return; }
    if (e.target.closest('#pl-slip-handle') && state.selected.size > 0) { state.slipOpen = !state.slipOpen; renderSlip(); }
  });

  // ── Init ─────────────────────────────────────────────────────
  (async function init() {
    render();  // paint immediately — Pre-built shows the shimmer skeleton, not black text

    // Presets are their own endpoint; load them now, never waiting on the board feed.
    if (state.mode === 'prebuilt') fetchPresets();

    // Board feed loads in the background so Build-your-own is ready when tapped.
    // It gates the paywall too (401/402), same as presets.
    try {
      state.picks = await fetchFeed();
      if (state.mode === 'custom') render();
      else if (state.mode === 'prebuilt' && !state.presets && !state.presetsLoading) fetchPresets();
    } catch (e) {
      if (e.message === 'paywall') renderPaywall();
      // non-paywall feed error: leave the Pre-built gallery as-is (it has its own data)
    }
  })();
})();
</script>
</body>
</html>
