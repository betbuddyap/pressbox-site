<style>
  /* ── Site nav (copied from live-lines.html — keep in sync across pages) ── */
  :root { --max: 1200px; }
  html, body { background: var(--cream); }
  body { font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  nav { background: var(--cream); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
  .nav-logo img { height: 68px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-mid); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .nav-links a.nav-live { color: var(--rust) !important; font-weight: 700; letter-spacing: 0.3px; position: relative; text-transform: uppercase; font-size: 11px; }
  .nav-links a.nav-live::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--rust); border-radius: 50%; margin-right: 7px; vertical-align: 2px; animation: pulse-live 2.4s ease-in-out infinite; }
  .nav-links a.nav-live:hover { color: var(--rust-light) !important; }
  .nav-links a.nav-live.active { color: var(--ink) !important; }
  .nav-links a.nav-live.active::before { background: var(--ink); animation: none; }
  @keyframes pulse-live { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  .mobile-menu a.nav-live-mobile { color: var(--rust) !important; }
  .hamburger { display: none; flex-direction: column !important; align-items: center; justify-content: center; gap: 5px; cursor: pointer; padding: 4px; background: transparent; border: 0; outline: 0; -webkit-appearance: none; appearance: none; border-radius: 0; box-shadow: none; width: 32px; height: 32px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }
  .mobile-menu { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--cream); z-index: 300; flex-direction: column; align-items: center; justify-content: center; gap: 36px; }
  .mobile-menu.open { display: flex !important; }
  .mobile-menu a { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--ink); text-decoration: none; }
  .mobile-menu .close-btn { position: absolute; top: 28px; right: 28px; font-size: 28px; cursor: pointer; background: none; border: none; color: var(--ink); line-height: 1; }
  @media (min-width: 961px) { .hamburger { display: none !important; } }
  @media (max-width: 960px) { .nav-links { display: none; } .hamburger { display: flex; } }

  /* ── Allocator-specific (everything else reuses live-lines.css ll- classes) ── */
  .al-intro { margin: var(--space-6) 0 var(--space-5); }
  .al-eyebrow { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.03em; color: var(--gold); margin: 0 0 var(--space-2); }
  .al-headline { font-family: var(--serif); font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--ink); margin: 0 0 var(--space-2); line-height: 1.1; }
  .al-sub { font-family: var(--sans); font-size: var(--text-base); color: var(--text-mid); margin: 0; max-width: 62ch; line-height: 1.55; }

  /* Controls panel */
  .al-controls { display: grid; grid-template-columns: 240px 1fr; gap: var(--space-6); align-items: start; background: var(--cream-dark); border: 0.5px solid var(--border); border-radius: 12px; padding: var(--space-5); margin-bottom: var(--space-5); }
  @media (max-width: 720px) { .al-controls { grid-template-columns: 1fr; gap: var(--space-5); } }
  .al-controls-left { display: flex; flex-direction: column; }
  .al-field-label { display: block; font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-mid); margin: 0 0 var(--space-2); }
  .al-money-wrap { position: relative; display: flex; align-items: center; width: 100%; }
  .al-money-wrap .al-prefix { position: absolute; left: 13px; font-family: var(--sans); font-weight: var(--weight-regular); font-size: var(--text-base); color: var(--text-mid); pointer-events: none; }
  .al-input { font-family: var(--sans); font-weight: var(--weight-regular); font-size: var(--text-base); color: var(--ink); background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 12px; width: 100%; box-sizing: border-box; transition: border-color 0.15s; }
  .al-input:focus { outline: none; border-color: var(--gold); }
  .al-input.al-money { padding-left: 26px; }
  .al-frac { display: flex; gap: var(--space-2); }
  .al-hint { font-family: var(--sans); font-size: var(--text-sm); color: var(--text-mid); margin: var(--space-2) 0 0; }

  /* Summary bar */
  .al-summary { display: flex; flex-wrap: wrap; align-items: baseline; gap: var(--space-2) var(--space-6); padding: var(--space-4) 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: var(--space-4); }
  .al-summary-stat { display: flex; flex-direction: column; gap: 2px; }
  .al-summary-k { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-mid); }
  .al-summary-v { font-family: var(--serif); font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--ink); line-height: 1.1; }
  .al-summary-v.al-hero { color: var(--gold); }
  .al-warn { background: color-mix(in srgb, var(--rust) 14%, transparent); border: 1px solid color-mix(in srgb, var(--rust) 35%, transparent); color: var(--rust); font-family: var(--sans); font-size: var(--text-sm); line-height: 1.5; padding: 12px 14px; border-radius: var(--radius-md); margin-bottom: var(--space-4); }

  /* Book allocator — how much to have at each sportsbook */
  .al-books { background: var(--cream-dark); border: 0.5px solid var(--border); border-radius: 12px; padding: var(--space-4) var(--space-5); margin-bottom: var(--space-5); }
  .al-books-title { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-mid); margin-bottom: var(--space-2); }
  .al-books-row { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); padding: var(--space-2) 0; border-bottom: 0.5px solid var(--cream-mid); }
  .al-books-row:last-child { border-bottom: none; }
  .al-books-name { font-family: var(--sans); font-size: var(--text-base); font-weight: var(--weight-semi); color: var(--ink); text-decoration: none; }
  a.al-books-name:hover { color: var(--gold); text-decoration: underline; }
  .al-books-amt { font-family: var(--sans); font-size: var(--text-base); font-weight: var(--weight-semi); color: var(--ink); }

  /* Bet rows reuse .ll-row; metrics + stake sit inline, vertically centered */
  .al-card { overflow: hidden; }
  .al-head { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-3) var(--space-4); width: 100%; background: transparent; border: none; text-align: left; font-family: inherit; cursor: pointer; }
  .al-head:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
  .ll-accordion .ll-bet-button { margin-top: var(--space-3); }
  .al-metrics { flex: 0 0 auto; display: flex; align-items: center; gap: var(--space-5); }
  .al-metric { display: flex; flex-direction: column; gap: 1px; }
  .al-metric-k { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-mid); line-height: 1.3; white-space: nowrap; }
  .al-metric-v { font-family: var(--sans); font-weight: var(--weight-semi); font-size: var(--text-sm); color: var(--ink); line-height: 1.3; }
  .al-metric-v.al-pos { color: var(--sage); }
  .al-metric-v.al-neg { color: var(--rust); }
  .al-stake { flex: 0 0 auto; text-align: right; }
  .al-stake-amt { font-family: var(--sans); font-size: var(--text-lg); font-weight: var(--weight-semi); color: var(--ink); line-height: 1.15; }
  .al-stake-lbl { font-family: var(--sans); font-size: var(--text-eyebrow); font-weight: var(--weight-semi); text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-mid); margin-top: 2px; white-space: nowrap; }
  .al-bet { display: block; }
  @media (max-width: 640px) {
    .al-head { flex-wrap: wrap; gap: var(--space-3); }
    .al-head > .ll-row-content { order: 1; }
    .al-head > .al-stake { order: 2; margin-left: auto; }
    .al-head > .ll-row-chevron { order: 3; }
    .al-head > .al-metrics { order: 4; flex: 1 0 100%; margin-top: var(--space-1); gap: var(--space-6); }
  }

  /* Include-parlays toggle */
  .al-toggle { display: inline-flex; align-items: center; gap: var(--space-2); margin-top: var(--space-4); background: none; border: none; padding: 0; cursor: pointer; font-family: var(--sans); font-size: var(--text-sm); font-weight: var(--weight-semi); color: var(--text-mid); }
  .al-toggle-box { width: 34px; height: 20px; border-radius: 999px; background: var(--cream-mid); border: 1px solid var(--border); position: relative; transition: background 0.15s, border-color 0.15s; flex: 0 0 auto; }
  .al-toggle-box::after { content: ''; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: transform 0.15s; }
  .al-toggle.active { color: var(--ink); }
  .al-toggle.active .al-toggle-box { background: var(--gold); border-color: var(--gold); }
  .al-toggle.active .al-toggle-box::after { transform: translateX(14px); }
  .al-toggle:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* Parlay cards */
  .al-badge-parlay { background: var(--gold); color: var(--ink); }
  .al-card-parlay { border-left: 3px solid var(--gold); }
  .al-pl-leg { padding: var(--space-2) 0; border-bottom: 0.5px solid var(--cream-mid); }
  .al-pl-leg:last-of-type { border-bottom: none; }
  .al-pl-leg-match { font-family: var(--sans); font-size: var(--text-sm); font-weight: var(--weight-semi); color: var(--ink); }
  .al-pl-leg-pick { font-family: var(--sans); font-size: var(--text-sm); color: var(--text-mid); margin-top: 1px; }
  .al-empty { padding: var(--space-6) 0; font-family: var(--sans); font-size: var(--text-base); color: var(--text-mid); }
  .al-page-pad { height: 48px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  'use strict';

  // ── Config (identical base to live-lines / parlay) ───────────
  const API_BASE  = 'https://betbuddy-backend.onrender.com';
  const BOARD_URL = `${API_BASE}/parlay/board`;
  const PRESETS_URL = `${API_BASE}/parlay/presets`;
  const SEASON    = 2026;

  const SUPABASE_URL  = 'https://brwalcuodwxsynrpiqjc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyd2FsY3VvZHd4c3lucnBpcWpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzMyNzQsImV4cCI6MjA5MjA0OTI3NH0.HjHkM1Ir9LGutCfAEQsOWOjQ6I5-otzGoReLvrPs6iQ';
  const sb = (typeof supabase !== 'undefined') ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

  // Objective presets — the tilt (β) decides WHAT gets the biggest slices.
  // weight = win_prob * decimal_odds^beta
  //   beta 0   -> weight = win prob            (favor most likely)
  //   beta 0.5 -> weight = win_prob * sqrt(odds)
  //   beta 1   -> weight = win_prob * odds     (favor expected payout)
  const PRESETS = [
    { key: 'conservative', label: 'Conservative', beta: 0.0,
      blurb: 'Weights toward the highest win probability.' },
    { key: 'moderate',     label: 'Moderate',     beta: 0.5,
      blurb: 'Balances win probability and payout.' },
    { key: 'aggressive',   label: 'Aggressive',   beta: 1.0,
      blurb: 'Weights toward the highest expected payout.' },
  ];

  const state = {
    legs: [], parlays: [], weeks: [], week: null,
    amount: 1000,          // total the user wants to bet, split 100%
    presetKey: 'moderate',
    includeParlays: true,  // roll a parlay or two into the mix
    filters: { market: null, aplusOnly: false },
    loading: true, error: false,
  };

  const root = document.getElementById('al-root');

  // ── Utilities (mirrored from live-lines / parlay) ────────────
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function weekLabel(w) { return w === 0 ? 'Week 0' : `Week ${w}`; }
  function fmtSigned(n) { return (Number(n) > 0 ? '+' : '') + n; }
  function fmtMoney(n) {
    const v = Math.round(Number(n) || 0);
    return v.toLocaleString('en-US');
  }
  function currentPreset() {
    return PRESETS.find(p => p.key === state.presetKey) || PRESETS[1];
  }

  function renderBadge(tier) {
    const map = {
      'A+':          { label: 'A+', aria: 'A plus tier',      key: 'aplus' },
      'A':           { label: 'A',  aria: 'A tier',           key: 'a' },
      'smart_money': { label: 'SM', aria: 'Smart Money tier', key: 'smart_money' },
      'goldilocks':  { label: 'GL', aria: 'Goldilocks tier',  key: 'goldilocks' },
      'lottery':     { label: 'LT', aria: 'Lottery tier',     key: 'lottery' },
      'no_edge':     { label: 'NE', aria: 'No edge',          key: 'no_edge' },
    };
    const m = map[tier] || { label: esc(tier), aria: esc(tier), key: 'no_edge' };
    return `<span class="ll-badge ll-badge--${m.key}" aria-label="${m.aria}">${m.label}</span>`;
  }

  function pickText(leg) {
    const bookName = leg.book && leg.book.name ? ` \u00b7 ${esc(leg.book.name)}` : '';
    if (leg.market === 'ml') return `${esc(leg.side)} ML <span class="ll-row-pick-num">${esc(leg.line)}</span>${bookName}`;
    return `${esc(leg.side)} <span class="ll-row-pick-num">${esc(leg.line)}</span>${bookName}`;
  }

  // ── Auth (mirrored from parlay — localStorage fast-path, 4s cap) ──
  async function getAccessToken() {
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('sb-') && k.endsWith('-auth-token')) {
          const v = JSON.parse(localStorage.getItem(k) || 'null');
          const tok = v && (v.access_token
                        || (v.currentSession && v.currentSession.access_token)
                        || (Array.isArray(v) && v[0]));
          if (tok) return tok;
        }
      }
    } catch (e) {}
    if (!sb) return null;
    try {
      const timeout = new Promise((res) => setTimeout(() => res(null), 4000));
      const live = sb.auth.getSession().then(
        (r) => (r && r.data && r.data.session && r.data.session.access_token) || null);
      return await Promise.race([live, timeout]);
    } catch (e) { return null; }
  }

  // ── Network ──────────────────────────────────────────────────
  async function fetchBoard() {
    state.loading = true; state.error = false; render();
    try {
      const headers = {};
      const token = await getAccessToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${BOARD_URL}?season=${SEASON}`, { credentials: 'omit', headers });
      if (res.status === 401 || res.status === 402) { state.loading = false; renderPaywall(); return; }
      if (!res.ok) throw new Error(`board HTTP ${res.status}`);
      const payload = await res.json();
      const legs = (payload.legs || []).filter(l => l && l.our_prob != null && l.decimal_odds != null);
      state.legs = legs;
      // Derive the week bar from the legs themselves (board returns the whole pool).
      const weeks = [...new Set(legs.map(l => l.week).filter(w => w != null))].sort((a, b) => a - b);
      state.weeks = weeks;
      if (state.week == null) state.week = (payload.week != null && weeks.includes(payload.week)) ? payload.week : (weeks[0] ?? null);
      // Show the straights immediately — don't make the page wait on parlays.
      state.loading = false;
      render();
      // Parlays load in the background and fill in when ready.
      fetchParlays().then(render).catch(() => {});
    } catch (e) {
      state.loading = false; state.error = true; render();
    }
  }

  // Roll a parlay or two into the pool. Primary source is ONE /parlay/presets
  // call (it builds the leg pool once and returns the whole gallery), so this is
  // a single round-trip, not one build per ticket. Combined win prob + combined
  // odds feed the same weight = p * odds^beta the straight bets use.

  // Signature of a ticket = its sorted leg ids, for de-duping tickets that
  // resolve to the same legs on a thin slate.
  function _legSig(legs) {
    return (legs || []).map(l => l.leg_id).sort().join('|');
  }

  function _normTicket(src, week, opts) {
    const c = src.combined || {};
    const bb = src.best_book || null;
    return {
      is_parlay:      true,
      parlay_id:      opts.id,
      name:           opts.name || 'Parlay',
      ptype:          opts.ptype,
      subtitle:       opts.subtitle || '',
      leg_count:      src.leg_count,
      week:           week,
      our_prob:       c.our_prob,
      decimal_odds:   c.decimal_odds,
      price_american: c.american_odds,
      edge:           (c.edge_vs_market != null ? c.edge_vs_market : null),
      legs:           Array.isArray(src.legs) ? src.legs : [],
      book:           bb ? { name: bb.book, url: bb.url } : null,
    };
  }

  async function fetchParlays() {
    if (!state.includeParlays) { state.parlays = []; return; }
    try {
      const headers = {};
      const token = await getAccessToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const wq = state.week != null ? `&week=${state.week}` : '';
      const valid = x => x && x.our_prob != null && x.decimal_odds != null
                           && (x.legs || []).length >= 2;

      const items = [], seen = new Set();

      // Primary: one presets call → pick two DISTINCT tickets (different
      // character when possible, always different leg sets).
      try {
        const res = await fetch(`${PRESETS_URL}?season=${SEASON}${wq}`, { credentials: 'omit', headers });
        if (res.ok) {
          const payload = await res.json();
          const wk = payload.week != null ? payload.week : state.week;
          const pref = ['best_3','longshot_3','safest_3','best_4','longshot_4','safest_4',
                        'best_5','longshot_5','safest_5'];
          const rank = id => { const i = pref.indexOf(id); return i === -1 ? 99 : i; };
          const gallery = (payload.presets || []).slice().sort((a, b) => rank(a.id) - rank(b.id));
          const types = new Set();
          for (const pre of gallery) {                 // distinct type + legs
            const it = _normTicket(pre, wk, { id: pre.id, name: pre.name, ptype: pre.type, subtitle: pre.subtitle });
            const sig = _legSig(it.legs);
            if (!valid(it) || seen.has(sig) || types.has(it.ptype)) continue;
            seen.add(sig); types.add(it.ptype); items.push(it);
            if (items.length >= 2) break;
          }
          if (items.length < 2) for (const pre of gallery) {   // fill any new leg set
            const it = _normTicket(pre, wk, { id: pre.id, name: pre.name, ptype: pre.type, subtitle: pre.subtitle });
            const sig = _legSig(it.legs);
            if (!valid(it) || seen.has(sig)) continue;
            seen.add(sig); items.push(it);
            if (items.length >= 2) break;
          }
        }
      } catch (_) { /* fall through to fallback */ }

      // Fallback (thin week only): one 2-leg prebuilt so the week still gets a
      // swing when presets couldn't assemble a full ticket.
      if (items.length < 2) {
        try {
          const r2 = await fetch(`${API_BASE}/parlay/prebuilt?season=${SEASON}&legs=2&bet_type=all&goal=max_return${wq}`,
                                 { credentials: 'omit', headers });
          if (r2.ok) {
            const pb = await r2.json();
            if (pb && Array.isArray(pb.legs)) {
              const it = _normTicket(pb, pb.week != null ? pb.week : state.week,
                                     { id: 'pb_max_return', name: 'Longshot', ptype: 'max_return' });
              const sig = _legSig(it.legs);
              if (valid(it) && !seen.has(sig)) { seen.add(sig); items.push(it); }
            }
          }
        } catch (_) { /* ignore */ }
      }

      state.parlays = items.slice(0, 2);
    } catch (e) {
      state.parlays = [];
    }
  }

  // ── Kelly sizing ─────────────────────────────────────────────
  function matchesFilters(leg) {
    if (state.week != null && leg.week !== state.week) return false;
    if (state.filters.aplusOnly && leg.tier !== 'A+') return false;
    if (state.filters.market && leg.market !== state.filters.market) return false;
    return true;
  }

  function computeRows() {
    const amount = Number(state.amount) || 0;
    const beta = currentPreset().beta;

    // Build candidates with a weight = win_prob * decimal_odds^beta.
    const cand = [];
    for (const leg of state.legs) {
      if (!matchesFilters(leg)) continue;
      const p = leg.our_prob, dec = leg.decimal_odds;
      if (!(p > 0) || !(dec > 1)) continue;
      cand.push({ item: leg, is_parlay: false, p, dec,
                  weight: p * Math.pow(dec, beta),
                  edge: (leg.edge != null ? leg.edge : null), ev: (p * dec - 1) });
    }

    // Parlays: single-slate, and they span markets/tiers — so only in the mix
    // when no single-market or A+ filter is narrowing the board.
    if (state.includeParlays && !state.filters.market && !state.filters.aplusOnly) {
      for (const pl of state.parlays) {
        if (state.week != null && pl.week !== state.week) continue;
        const p = pl.our_prob, dec = pl.decimal_odds;
        if (!(p > 0) || !(dec > 1)) continue;
        cand.push({ item: pl, is_parlay: true, p, dec,
                    weight: p * Math.pow(dec, beta),
                    edge: (pl.edge != null ? pl.edge : null), ev: (p * dec - 1) });
      }
    }

    const totalW = cand.reduce((s, c) => s + c.weight, 0);
    const rows = cand.map(c => {
      const share = totalW > 0 ? c.weight / totalW : 0;   // fraction of the pot
      const stake = amount * share;
      return { ...c, share, stake, payout: stake * c.dec };
    });
    // Biggest slices on top — this is where the preset's tilt shows.
    rows.sort((a, b) => b.stake - a.stake);
    return rows;
  }

  function summaryHTML(rows) {
    const totalStake  = rows.reduce((s, r) => s + r.stake, 0);
    const allWinPay   = rows.reduce((s, r) => s + r.payout, 0);   // if every leg hits
    // Stake-weighted average win probability — the number that actually moves with
    // the weighting: high on Conservative, lower as you tilt toward payouts.
    const avgWin = totalStake > 0
      ? rows.reduce((s, r) => s + r.stake * r.p, 0) / totalStake
      : 0;
    return `

  // Book allocator: sum every bet's stake by the book its "Bet at X" button
  // points to, so the user knows how much to have at each sportsbook. A bet with
  // no listed book is grouped under a clear catch-all.
  function bookTotalsHTML(rows) {
    if (!rows.length) return '';
    const totals = new Map(), urls = new Map();
    for (const r of rows) {
      const b = r.item.book;
      const name = (b && b.name) ? b.name : 'No book listed';
      totals.set(name, (totals.get(name) || 0) + r.stake);
      if (b && b.url && !urls.has(name)) urls.set(name, b.url);
    }
    const arr = [...totals.entries()].sort((a, b) => b[1] - a[1]);
    const rowsHTML = arr.map(([name, amt]) => {
      const url = urls.get(name);
      const nameHTML = url
        ? `<a class="al-books-name" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(name)}</a>`
        : `<span class="al-books-name">${esc(name)}</span>`;
      return `<div class="al-books-row">${nameHTML}<span class="al-books-amt">$${fmtMoney(amt)}</span></div>`;
    }).join('');
    return `
      <div class="al-books">
        <div class="al-books-title">What to have at each book</div>
        ${rowsHTML}
      </div>`;
  }

    const deltaClass =
      b.delta === 'match' ? 'll-book-delta--match'

  // ── Top-level render ─────────────────────────────────────────
  function render() {
    if (state.loading) {
      root.innerHTML = loadingHTML();
      return;
    }
    if (state.error) {
      root.innerHTML = `${introHTML()}<div class="al-empty">Couldn't load the board. Refresh to try again.</div>`;
      return;
    }
    const rows = computeRows();
    root.innerHTML = `
      ${introHTML()}
      ${controlsHTML()}
      ${weekTabsHTML()}
      ${filtersHTML()}
      <div id="al-summary">${summaryHTML(rows)}</div>
      <div id="al-books-wrap">${bookTotalsHTML(rows)}</div>
      <div id="al-results">${listHTML(rows)}</div>`;
    bindInputs();
  }

  // Recompute only the summary + book totals + list (on text input, keeps focus).
  function recompute() {
    const rows = computeRows();
    const s = document.getElementById('al-summary');
    const bw = document.getElementById('al-books-wrap');
    const l = document.getElementById('al-results');
    if (s) s.innerHTML = summaryHTML(rows);
    if (bw) bw.innerHTML = bookTotalsHTML(rows);
    if (l) l.innerHTML = listHTML(rows);
  }

  function bindInputs() {
    const amt = document.getElementById('al-amount');
    if (amt) {
      amt.addEventListener('input', () => {
        const digits = amt.value.replace(/[^0-9]/g, '');
        state.amount = digits ? parseInt(digits, 10) : 0;
        recompute();
      });
      amt.addEventListener('blur', () => { amt.value = fmtMoney(state.amount); });
    }
  }

  // ── Events (delegated; pills + week tabs) ────────────────────
  document.addEventListener('click', (e) => {
    const head = e.target.closest('[data-action="toggle-card"]');
    if (head) {
      const row = head.closest('.ll-row');
      const open = row.getAttribute('aria-expanded') === 'true';
      row.setAttribute('aria-expanded', open ? 'false' : 'true');
      head.setAttribute('aria-expanded', open ? 'false' : 'true');
      return;
    }

    const parToggle = e.target.closest('[data-action="toggle-parlays"]');
    if (parToggle) {
      state.includeParlays = !state.includeParlays;
      render();   // reflect the toggle at once
      if (state.includeParlays && !state.parlays.length) {
        fetchParlays().then(render).catch(() => {});
      }
      return;
    }

    const preset = e.target.closest('.al-preset-pill[data-preset]');
    if (preset) { state.presetKey = preset.dataset.preset; render(); return; }

    const fpill = e.target.closest('.ll-filter-pill[data-filter]');
    if (fpill && !fpill.classList.contains('al-preset-pill')) {
      const key = fpill.dataset.filter;
      const f = state.filters;
      if (key === 'all') { f.market = null; f.aplusOnly = false; }
      else if (key === 'aplus') { f.aplusOnly = !f.aplusOnly; if (f.aplusOnly) f.market = null; }
      else { f.market = (f.market === key) ? null : key; }
      render();
      return;
    }

    const wtab = e.target.closest('.ll-week-tab[data-week]');
    if (wtab) {
      state.week = Number(wtab.dataset.week);
      state.parlays = [];   // clear last week's tickets so they don't linger
      render();             // new week's straights show immediately
      // Parlays are single-slate; refresh them for the new week in the background.
      fetchParlays().then(render).catch(() => {});
      return;
    }
  });

  // ── Init ─────────────────────────────────────────────────────
  render();          // paint intro + loading immediately
  fetchBoard();
})();
</script>

</body>
</html>
