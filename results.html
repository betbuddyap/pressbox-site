<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<meta property="og:type" content="website">
<meta property="og:site_name" content="PressBox Analytics">
<meta property="og:url" content="https://pressboxanalytics.com/results.html">
<meta property="og:title" content="Track Record — PressBox Analytics">
<meta property="og:description" content="Two seasons under the locked spec. Every pick, every result, every tier.">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Tokens FIRST, components AFTER -->
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/components/live-lines.css">

<style>
  /* ── Site nav (copy of live-lines nav — keep in sync) ── */
  :root { --max: 1200px; }
  nav { background: var(--cream); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
  .nav-logo img { height: 68px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-mid); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }

  .nav-links a.nav-live {
    color: var(--rust) !important;
    font-weight: 700;
    letter-spacing: 0.3px;
    position: relative;
    text-transform: uppercase;
    font-size: 11px;
  }
  .nav-links a.nav-live::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: 2px;
    animation: pulse-live 2.4s ease-in-out infinite;
  }
  .nav-links a.nav-live:hover { color: var(--rust-light) !important; }
  @keyframes pulse-live {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .mobile-menu a.nav-live-mobile { color: var(--rust) !important; }

  .hamburger { display: none; flex-direction: column !important; align-items: center; justify-content: center; gap: 4px; background: none; border: none; padding: 8px; cursor: pointer; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); }
  .mobile-menu { display: none; position: fixed; inset: 0; background: var(--cream); z-index: 200; padding: 80px 32px; flex-direction: column; gap: 24px; }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { color: var(--ink); text-decoration: none; font-size: 22px; font-family: var(--serif); }
  .mobile-menu .close-btn { position: absolute; top: 24px; right: 24px; font-size: 28px; background: none; border: none; color: var(--ink); line-height: 1; cursor: pointer; }
  @media (min-width: 961px) { .hamburger { display: none !important; } }
  @media (max-width: 960px) { .nav-links { display: none; } .hamburger { display: flex; } }

  /* ── Page-specific: results summary ── */
  /* Match live-lines.css patterns. Stat row sits below the week tabs,
     uses serif numbers (same as the hero stat treatment elsewhere on
     the site), and is just inline text — no card chrome. */
  .ll-summary {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-6);
    padding: var(--space-5) 0;
    margin-bottom: var(--space-4);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .ll-summary-cell {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    min-width: 140px;
  }
  .ll-summary-label {
    font-size: var(--text-eyebrow);
    font-weight: var(--weight-semi);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .ll-summary-value {
    font-family: var(--serif);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--ink);
    line-height: 1;
  }
  .ll-summary-value em {
    font-style: italic;
    color: var(--gold);
  }

  /* Result column in the row — replaces the chevron. Live Lines rows
     are clickable (expand). Results rows are static, so we drop the
     chevron and put a simple W / L / P / — in its place. Plain serif,
     no badge chrome. Color is conveyed through context, not background. */
  .ll-row-result {
    flex-shrink: 0;
    font-family: var(--serif);
    font-size: var(--text-lg);
    font-weight: var(--weight-bold);
    line-height: 1;
    width: 24px;
    text-align: center;
    margin-left: var(--space-2);
  }
  .ll-row-result.win  { color: var(--sage); }
  .ll-row-result.loss { color: var(--rust); }
  .ll-row-result.push { color: var(--text-light); }

  /* Override the row cursor — these aren't clickable. */
  .ll-row-static {
    cursor: default;
  }

  /* Footer note */
  .ll-footer-note {
    margin-top: var(--space-8);
    padding-top: var(--space-5);
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-mid);
    font-size: var(--text-sm);
    line-height: 1.6;
  }
  .ll-footer-note a { color: var(--ink); text-decoration: underline; }
</style>
</head>

<body class="ll-page">

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/pressbox-w2a-cream-cropped.png" alt="PressBox Analytics" style="height:68px;width:auto;display:block;">
    </a>
    <ul class="nav-links">
      <li><a href="/live-lines.html" class="nav-live">Live Lines</a></li>
      <li><a href="/results.html" class="active">Results</a></li>
      <li><a href="/how-it-works.html">How It Works</a></li>
      <li><a href="/about.html">About</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <button class="close-btn" onclick="document.getElementById('mobileMenu').classList.remove('open')" aria-label="Close menu">✕</button>
  <a href="/live-lines.html" class="nav-live-mobile">Live Lines</a>
  <a href="/results.html">Results</a>
  <a href="/how-it-works.html">How It Works</a>
  <a href="/about.html">About</a>
</div>
<script>
function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }
</script>

<main id="results-app" class="ll-container">
  <div class="ll-skeleton">Loading...</div>
</main>

<script>
(function() {
  'use strict';

  const API_BASE = 'https://betbuddy-backend.onrender.com';

  // ── State ──────────────────────────────────────────────────────────
  const state = {
    season:    'all',
    tier:      'all',
    market:    'all',
    week:      null,        // null = "all weeks"
    weeks:     [],          // populated from rows
    rows:      [],          // current filtered rows from server
    summary:   null,
    loading:   false,
  };

  // ── Helpers ────────────────────────────────────────────────────────
  function $app() { return document.getElementById('results-app'); }
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function fmtPct(v) {
    if (v == null) return '—';
    return (v * 100).toFixed(1) + '%';
  }
  function fmtRoi(v) {
    if (v == null) return '—';
    const sign = v >= 0 ? '+' : '';
    return sign + (v * 100).toFixed(1) + '%';
  }
  function fmtUnits(v) {
    if (v == null) return '—';
    const sign = v >= 0 ? '+' : '';
    return sign + v.toFixed(1) + 'u';
  }

  // Tier slug → CSS class key for ll-badge--{key}
  function tierBadgeKey(slug) {
    if (slug === 'A+') return 'aplus';
    if (slug === 'A')  return 'a';
    return slug; // smart_money, goldilocks, lottery match the CSS class names directly
  }

  // Group rows by week for the week tab list
  function computeWeeks(rows) {
    const seasons = new Set();
    rows.forEach(r => { if (r.season) seasons.add(r.season); });
    // If exactly one season selected, group by week number alone.
    // If multiple seasons, group by "{season} Wk {week}" composite key.
    const weeks = [];
    const seen = new Set();
    rows.forEach(r => {
      if (r.week == null) return;
      const key = `${r.season}-${r.week}`;
      if (seen.has(key)) return;
      seen.add(key);
      weeks.push({ season: r.season, week: r.week, key });
    });
    // Sort descending: latest season first, then latest week
    weeks.sort((a, b) => {
      if (a.season !== b.season) return b.season - a.season;
      return b.week - a.week;
    });
    return weeks;
  }

  function weekLabel(weekObj, isSingleSeason) {
    return isSingleSeason
      ? `Wk ${weekObj.week}`
      : `${weekObj.season} Wk ${weekObj.week}`;
  }

  // ── Render: hero ───────────────────────────────────────────────────
  function renderHero() {
    return `
      <header class="ll-header">
        <div class="ll-eyebrow">— Track Record</div>
        <h1 class="ll-headline">Two seasons under the <em style="font-style:italic;color:var(--gold);">locked spec.</em></h1>
        <div class="ll-meta">
          <span>Every pick across 2024 and 2025. Filter by season, tier, or market — the numbers don't move based on what you select.</span>
        </div>
      </header>
    `;
  }

  // ── Render: filter pills ───────────────────────────────────────────
  function renderFilters() {
    function pill(filterName, value, label) {
      const active = state[filterName] === value;
      return `
        <button class="ll-filter-pill"
                data-filter="${esc(filterName)}"
                data-value="${esc(value)}"
                aria-pressed="${active ? 'true' : 'false'}">
          ${esc(label)}
        </button>
      `;
    }
    return `
      <div class="ll-filters" style="display:flex;flex-direction:column;gap:var(--space-3);">
        <div class="ll-filters-row" style="display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);">
          <span class="ll-filter-label">Season</span>
          ${pill('season', 'all',  'All')}
          ${pill('season', '2024', '2024')}
          ${pill('season', '2025', '2025')}
        </div>
        <div class="ll-filters-row" style="display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);">
          <span class="ll-filter-label">Tier</span>
          ${pill('tier', 'all',         'All')}
          ${pill('tier', 'A+',          'A+')}
          ${pill('tier', 'A',           'A')}
          ${pill('tier', 'smart_money', 'Smart Money')}
          ${pill('tier', 'goldilocks',  'Goldilocks')}
          ${pill('tier', 'lottery',     'Lottery')}
        </div>
        <div class="ll-filters-row" style="display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);">
          <span class="ll-filter-label">Market</span>
          ${pill('market', 'all',    'All')}
          ${pill('market', 'spread', 'Spread')}
          ${pill('market', 'total',  'Total')}
          ${pill('market', 'ml',     'Moneyline')}
        </div>
      </div>
    `;
  }

  // ── Render: summary stats ──────────────────────────────────────────
  function renderSummary(s) {
    if (!s || s.total === 0) {
      return `
        <div class="ll-summary">
          <div class="ll-summary-cell" style="flex:1;">
            <div class="ll-summary-label">No graded picks match these filters.</div>
          </div>
        </div>
      `;
    }
    return `
      <div class="ll-summary">
        <div class="ll-summary-cell">
          <div class="ll-summary-label">Record</div>
          <div class="ll-summary-value">${esc(s.record)}</div>
        </div>
        <div class="ll-summary-cell">
          <div class="ll-summary-label">Hit rate</div>
          <div class="ll-summary-value">${fmtPct(s.hit_rate)}</div>
        </div>
        <div class="ll-summary-cell">
          <div class="ll-summary-label">Profit</div>
          <div class="ll-summary-value"><em>${fmtUnits(s.profit_units)}</em></div>
        </div>
        <div class="ll-summary-cell">
          <div class="ll-summary-label">ROI</div>
          <div class="ll-summary-value"><em>${fmtRoi(s.roi)}</em></div>
        </div>
      </div>
    `;
  }

  // ── Render: week tabs ──────────────────────────────────────────────
  function renderWeekTabs() {
    if (!state.weeks || state.weeks.length === 0) return '';

    const isSingleSeason = state.season !== 'all';
    const allTab = `
      <button class="ll-week-tab ${state.week === null ? 'active' : ''}"
              data-week="all" role="tab"
              aria-selected="${state.week === null ? 'true' : 'false'}">
        All weeks
      </button>
    `;
    const weekTabs = state.weeks.map(w => `
      <button class="ll-week-tab ${state.week === w.key ? 'active' : ''}"
              data-week="${esc(w.key)}" role="tab"
              aria-selected="${state.week === w.key ? 'true' : 'false'}">
        ${esc(weekLabel(w, isSingleSeason))}
      </button>
    `).join('');

    return `
      <div class="ll-week-bar" style="overflow-x:auto;">
        <div class="ll-week-bar-inner" role="tablist" aria-label="Pick week">
          ${allTab}${weekTabs}
        </div>
      </div>
    `;
  }

  // ── Render: pick row (mimics Live Lines row layout) ────────────────
  function renderRow(r) {
    const badgeKey = tierBadgeKey(r.tier);
    const lineDisplay = r.line == null ? '' : (
      r.line > 0 ? '+' + r.line : String(r.line)
    );
    const pickText = r.market === 'total'
      ? `${esc(r.pick_side)} <span class="ll-row-pick-num">${esc(lineDisplay)}</span>`
      : `${esc(r.pick_side)} <span class="ll-row-pick-num">${esc(lineDisplay)}</span>`;

    const resultLabel = r.result === 'win'  ? 'W'
                       : r.result === 'loss' ? 'L'
                       : r.result === 'push' ? 'P'
                       : '—';
    const resultClass = r.result || 'pending';

    return `
      <article class="ll-row">
        <div class="ll-row-header ll-row-static">
          <span class="ll-badge ll-badge--${esc(badgeKey)}" aria-label="${esc(r.tier_display)}">
            ${esc(r.tier_display === 'Smart Money' ? 'SM' :
                  r.tier_display === 'Goldilocks'  ? 'GL' :
                  r.tier_display === 'Lottery'     ? 'LT' :
                  r.tier_display)}
          </span>
          <div class="ll-row-content">
            <div class="ll-row-matchup">${esc(r.matchup)}</div>
            <div class="ll-row-pick">${pickText} <span style="color:var(--text-light);">· ${esc(r.book || 'unbooked')}</span></div>
          </div>
          <span class="ll-row-result ${esc(resultClass)}" title="${esc(resultLabel === 'W' ? 'Win' : resultLabel === 'L' ? 'Loss' : resultLabel === 'P' ? 'Push' : 'Pending')}">
            ${esc(resultLabel)}
          </span>
        </div>
      </article>
    `;
  }

  // ── Render: feed of rows, optionally filtered by week ──────────────
  function renderRows() {
    let rows = state.rows;
    if (state.week !== null) {
      rows = rows.filter(r => `${r.season}-${r.week}` === state.week);
    }
    if (rows.length === 0) {
      return `
        <div style="padding:var(--space-8) 0;text-align:center;color:var(--text-mid);">
          No picks in this view.
        </div>
      `;
    }
    return rows.map(renderRow).join('');
  }

  // ── Render: full page ──────────────────────────────────────────────
  function render() {
    $app().innerHTML = `
      ${renderHero()}
      ${renderFilters()}
      ${renderSummary(state.summary)}
      ${renderWeekTabs()}
      <div id="results-rows">${renderRows()}</div>
      <p class="ll-footer-note">
        Wins, losses, and pushes only. Picks that landed in No Edge by kickoff aren't counted here —
        no side was recommended, so there's nothing to score.
        The full live board is at <a href="/live-lines.html">Live Lines</a>.
      </p>
    `;
    attachHandlers();
  }

  function renderRowsOnly() {
    const el = document.getElementById('results-rows');
    if (el) el.innerHTML = renderRows();
  }

  // ── Handlers ───────────────────────────────────────────────────────
  function attachHandlers() {
    // Filter pills
    document.querySelectorAll('.ll-filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        const filterName = btn.dataset.filter;
        const value      = btn.dataset.value;
        if (state[filterName] === value) return;
        state[filterName] = value;
        // Reset week selection when filters change (week list may differ)
        state.week = null;
        refresh();
      });
    });

    // Week tabs
    document.querySelectorAll('.ll-week-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const w = btn.dataset.week;
        const newWeek = (w === 'all') ? null : w;
        if (state.week === newWeek) return;
        state.week = newWeek;
        // Just re-render rows + tab states; summary stays since it's the full server response
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // ── Fetch ──────────────────────────────────────────────────────────
  async function refresh() {
    if (state.loading) return;
    state.loading = true;

    const params = new URLSearchParams({
      season: state.season,
      tier:   state.tier,
      market: state.market,
    });

    $app().innerHTML = `<div style="padding:var(--space-12) 0;text-align:center;color:var(--text-light);">Loading...</div>`;

    try {
      const res = await fetch(`${API_BASE}/canonical/results/summary?${params.toString()}`, {
        credentials: 'omit',
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      state.summary = data.summary;
      state.rows    = data.rows || [];
      state.weeks   = computeWeeks(state.rows);
      render();
    } catch (err) {
      console.error('Results fetch failed:', err);
      $app().innerHTML = `
        <div style="padding:var(--space-12) 0;text-align:center;color:var(--rust);">
          Couldn't load results. Refresh to try again.
        </div>
      `;
    } finally {
      state.loading = false;
    }
  }

  // ── Boot ───────────────────────────────────────────────────────────
  refresh();
})();
</script>

</body>
</html>
