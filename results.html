<style>
  /* ── Site nav (copy of live-lines nav — keep in sync) ── */
  :root { --max: 1200px; }
  nav { background: var(--cream); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
  .nav-logo img { height: 68px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-mid); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }

  .nav-links a.nav-live {
    color: var(--rust) !important;
    font-weight: 700;
    letter-spacing: 0.3px;
    position: relative;
    text-transform: uppercase;
    font-size: 11px;
  }
  .nav-links a.nav-live::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--rust);
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: 2px;
    animation: pulse-live 2.4s ease-in-out infinite;
  }
  .nav-links a.nav-live:hover { color: var(--rust-light) !important; }
  @keyframes pulse-live {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .mobile-menu a.nav-live-mobile { color: var(--rust) !important; }

  .hamburger { display: none; flex-direction: column !important; align-items: center; justify-content: center; gap: 4px; background: none; border: none; padding: 8px; cursor: pointer; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); }
  .mobile-menu { display: none; position: fixed; inset: 0; background: var(--cream); z-index: 200; padding: 80px 32px; flex-direction: column; gap: 24px; }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { color: var(--ink); text-decoration: none; font-size: 22px; font-family: var(--serif); }
  .mobile-menu .close-btn { position: absolute; top: 24px; right: 24px; font-size: 28px; background: none; border: none; color: var(--ink); line-height: 1; cursor: pointer; }
  @media (min-width: 961px) { .hamburger { display: none !important; } }
  @media (max-width: 960px) { .nav-links { display: none; } .hamburger { display: flex; } }
</style>
</head>
